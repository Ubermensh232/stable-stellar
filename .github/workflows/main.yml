name: Monorepo CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'contract/**'
      - 'backend/**'
      - 'frontend/**'
  pull_request:

jobs:

  # 🦀 CONTRACT (Stellar / Soroban)
  contract:
    name: Build & Test Contract
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contract

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🦀 Install Rust
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # ⚡ Cache Rust deps
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}

      # 🎯 Add WASM target
      - name: Add WASM target
        run: rustup target add wasm32v1-none

      # ⚡ Install Stellar CLI (NEW)
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ✅ Verify CLI
      - name: Check CLI
        run: stellar --version

      # 🎨 Format check
      - name: Check formatting
        run: cargo fmt -- --check

      # 🧠 Lint
      - name: Clippy
        run: cargo clippy -- -D warnings

      # 🔨 Build contract
      - name: Build contract
        run: cargo build --target wasm32-unknown-unknown --release

      # ⚡ Optimize WASM (optional but recommended)
      - name: Optimize WASM
        run: |
          stellar contract optimize \
          --wasm target/wasm32-unknown-unknown/release/*.wasm

      # 🧪 Run tests
      - name: Run tests
        run: cargo test

  # 🛠 BACKEND (NestJS)
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Run tests
        run: npm run test || true

      - name: Build backend
        run: npm run build

  # 🎨 FRONTEND (Next.js)
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
