name: Monorepo CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'contract/**'
      - 'backend/**'
      - 'frontend/**'
  pull_request:

jobs:

  # 🦀 CONTRACT (Stellar / Soroban)
  contract:
    name: Build & Test Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install Rust + correct WASM target in one step
      - name: Install Rust & WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      # Cache dependencies
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      # Install Stellar CLI
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Verify versions
      - name: Check versions
        run: |
          rustc --version
          cargo --version
          stellar --version

      # ───── All contract commands now use correct working directory ─────
      - name: Check formatting
        working-directory: contracts
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: contracts
        run: cargo clippy --all-targets -- -D warnings

      - name: Build contract
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release

      - name: Optimize WASM
        working-directory: contracts
        run: |
          stellar contract optimize \
            --wasm target/wasm32v1-none/release/*.wasm

      - name: Run tests
        working-directory: contracts
        run: cargo test
