name: CI - Backend (NestJS) + Contracts + Frontend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ====================== RUST / SOROBAN CONTRACTS ======================
      - name: Install Rust + wasm32v1-none target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./contracts

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v25.2.0

      - name: Build Soroban Contracts
        run: |
          cd contracts
          stellar contract build

      - name: Test Contracts
        run: |
          cd contracts
          cargo test --all-targets --all-features

      - name: Lint Contracts
        run: |
          cd contracts
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings

      # ====================== BACKEND - NESTJS ======================
      - name: Setup Node.js for Backend
        uses: actions/setup-node@v4
        with:
          node-version: 20          # or 22 if you prefer
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json   # change to yarn.lock or pnpm-lock.yaml if needed

      - name: Install Backend dependencies
        run: |
          cd backend
          npm ci

      - name: Lint Backend (NestJS)
        run: |
          cd backend
          npm run lint || true          # remove "|| true" if you want CI to fail on lint errors

      - name: Build Backend
        run: |
          cd backend
          npm run build

      - name: Test Backend
        run: |
          cd backend
          npm run test

      # Optional: Run e2e tests (uncomment if you have them)
      # - name: Test Backend (e2e)
      #   run: |
      #     cd backend
      #     npm run test:e2e

      # ====================== FRONTEND ======================
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint || true

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
